name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v2.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Prepare release tag once before matrix builds
  # ════════════════════════════════════════════════════════════════════════
  prepare-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must look like v2.2.0: $TAG" >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag already exists: $TAG" >&2
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          node - "$TAG" <<'NODE'
          const fs = require('node:fs');

          const tag = process.argv[2];
          const readJson = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const readCargoVersion = (path) => {
            const text = fs.readFileSync(path, 'utf8');
            const match = text.match(/^version\s*=\s*"([^"]+)"/m);
            if (!match) throw new Error(`Missing package version in ${path}`);
            return match[1];
          };

          const version = readJson('package.json').version;
          const expectedTag = `v${version}`;
          if (tag !== expectedTag) {
            throw new Error(`Release tag ${tag} does not match package.json version ${version}; expected ${expectedTag}`);
          }

          const versions = [
            ['package.json', version],
            ['src-tauri/tauri.conf.json', readJson('src-tauri/tauri.conf.json').version],
            ['src-tauri/Cargo.toml', readCargoVersion('src-tauri/Cargo.toml')],
            ['installer/package.json', readJson('installer/package.json').version],
            ['installer/src-tauri/tauri.conf.json', readJson('installer/src-tauri/tauri.conf.json').version],
            ['installer/src-tauri/Cargo.toml', readCargoVersion('installer/src-tauri/Cargo.toml')],
          ];

          const mismatches = versions.filter(([, value]) => value !== version);
          if (mismatches.length) {
            throw new Error(`Version mismatch: ${mismatches.map(([path, value]) => `${path}=${value}`).join(', ')}; expected ${version}`);
          }

          console.log(`Release version verified: ${expectedTag}`);
          NODE

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "release: $TAG"
            git push origin "$TAG"
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════
  # Build per platform (Windows + macOS Apple Silicon in parallel)
  # ════════════════════════════════════════════════════════════════════════
  build:
    needs: prepare-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Visual Studio (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            installer/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Check Tauri updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for release updater artifacts" >&2
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required for release updater artifacts" >&2
            exit 1
          fi

      # ── Windows: build main app + self-built installer ──────────────────
      - name: Build main app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx tauri build --no-bundle
          if ($LASTEXITCODE -ne 0) { throw "main app build failed" }
          if (-not (Test-Path "src-tauri/target/release/mynx.exe")) {
            throw "mynx.exe not produced"
          }
          Write-Host "OK: mynx.exe ($([math]::Round((Get-Item 'src-tauri/target/release/mynx.exe').Length/1MB,1)) MB)"

      - name: Sync installer payload (Windows)
        if: runner.os == 'Windows'
        run: npm run installer:payload

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd installer
          npm ci
          npm run tauri:build
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }
          $exe = "src-tauri\target\release\mynx-installer.exe"
          if (-not (Test-Path $exe)) { throw "installer exe not produced: $exe" }
          Write-Host "OK: $exe ($([math]::Round((Get-Item $exe).Length/1MB,1)) MB)"

      - name: Sign Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $installerPath = "installer\src-tauri\target\release\mynx-installer.exe"
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) { throw "TAURI_SIGNING_PRIVATE_KEY is required" }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) { throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required" }

          & npx tauri signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$installerPath"
          if ($LASTEXITCODE -ne 0) { throw "installer signing failed" }
          if (-not (Test-Path "$installerPath.sig")) { throw "installer signature not produced" }

          $sig = (Get-Content "$installerPath.sig" -Raw).Trim()
          if (-not $sig) { throw "installer signature is empty" }
          Write-Host "Installer signed successfully"

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            installer/src-tauri/target/release/mynx-installer.exe
            installer/src-tauri/target/release/mynx-installer.exe.sig
          if-no-files-found: error

      # ── macOS: build Apple Silicon .app + .dmg + updater .app.tar.gz ─────
      #
      # Apple Developer ID notarization is not configured because this project
      # intentionally does not use a paid Apple Developer Program account.
      # Browser-downloaded DMGs are blocked by Gatekeeper ("damaged, can't be
      # opened") and on macOS 26 (Tahoe) AMFI kills unsigned executables.
      # To work around both: a 修复损坏.command script is injected into the
      # DMG (next step) with ad-hoc signing applied to both the .app and the
      # .command. Users right-click → Open the script once to clear the
      # quarantine xattr and apply ad-hoc signing via a guided native dialog.
      # This workflow still fails fast if Tauri updater artifacts/signatures
      # are missing.
      #
      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npx tauri build --target aarch64-apple-darwin --bundles app,dmg

          app_count=$(find src-tauri/target/aarch64-apple-darwin -name '*.app' -type d | wc -l | tr -d ' ')
          if [ "$app_count" -lt 1 ]; then
            echo "macOS .app bundle not produced" >&2
            exit 1
          fi
          find src-tauri/target/aarch64-apple-darwin -name '*.app' -type d -print

      - name: Inject fix script into DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          # The fix script must be executable when extracted from the DMG.
          chmod +x src-tauri/scripts/fix-damaged.command

          # Locate the Tauri-produced DMG (read-only UDZO format).
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          ORIG_DMG=$(find "$DMG_DIR" -name '*.dmg' -type f | head -1)
          if [ -z "$ORIG_DMG" ]; then
            echo "::error::Original DMG not found for fix script injection" >&2
            exit 1
          fi
          echo "Original DMG: $ORIG_DMG"

          # Tauri's DMG is read-only (UDZO). Convert to read-write (UDRW) so we
          # can copy the fix script into it, then re-compress back to UDZO.
          RW_DMG="${DMG_DIR}/tmp-rw.dmg"
          hdiutil convert "$ORIG_DMG" -format UDRW -o "$RW_DMG" \
            >/dev/null 2>&1
          if [ ! -f "$RW_DMG" ]; then
            echo "::error::Failed to convert DMG to read-write format" >&2
            exit 1
          fi

          # Mount the read-write DMG and copy the fix script into it.
          MOUNT_POINT=$(mktemp -d /tmp/mynx-dmg-mount-XXXX)
          if ! hdiutil attach -nobrowse -noautoopen -mountpoint "$MOUNT_POINT" "$RW_DMG" \
            >/dev/null 2>&1; then
            echo "::error::Failed to mount read-write DMG" >&2
            rm -rf "$MOUNT_POINT" "$RW_DMG"
            exit 1
          fi

          echo "=== DMG contents before injection ==="
          ls -la "$MOUNT_POINT"

          cp src-tauri/scripts/fix-damaged.command "$MOUNT_POINT/修复损坏.command"
          chmod +x "$MOUNT_POINT/修复损坏.command"

          # Ad-hoc sign both the .app and the .command script. On macOS 26
          # (Tahoe), AMFI kills unsigned ARM executables with SIGKILL before
          # they can run — this includes the .command fix script itself.
          # Ad-hoc signing (codesign -s -) requires no Apple Developer account
          # and is sufficient to satisfy AMFI on Apple Silicon.
          echo "Ad-hoc signing Mynx.app…"
          codesign --force --deep --sign - "$MOUNT_POINT/Mynx.app" 2>&1 || true
          echo "Ad-hoc signing 修复损坏.command…"
          codesign --force --sign - "$MOUNT_POINT/修复损坏.command" 2>&1 || true

          echo "=== DMG contents after injection ==="
          ls -la "$MOUNT_POINT"

          hdiutil detach "$MOUNT_POINT" >/dev/null 2>&1 || true
          rm -rf "$MOUNT_POINT"

          # Re-compress back to read-only UDZO, replacing the original DMG.
          FINAL_DMG="${DMG_DIR}/tmp-final.dmg"
          hdiutil convert "$RW_DMG" -format UDZO -imagekey zlib-level=9 -o "$FINAL_DMG" \
            >/dev/null 2>&1
          rm -f "$RW_DMG"

          if [ ! -f "$FINAL_DMG" ]; then
            echo "::error::Failed to re-compress DMG to UDZO format" >&2
            exit 1
          fi

          # Replace the original DMG with the one containing the fix script.
          DMG_NAME=$(basename "$ORIG_DMG")
          mv -f "$FINAL_DMG" "$ORIG_DMG"
          echo "Rebuilt DMG with fix script: $ORIG_DMG"

          # Verify the final DMG contains both Mynx.app and the fix script.
          VERIFY_MOUNT=$(mktemp -d /tmp/mynx-dmg-verify-XXXX)
          if ! hdiutil attach -nobrowse -noautoopen -mountpoint "$VERIFY_MOUNT" "$ORIG_DMG" \
            >/dev/null 2>&1; then
            echo "::error::Failed to mount final DMG for verification" >&2
            rm -rf "$VERIFY_MOUNT"
            exit 1
          fi
          echo "=== Final DMG contents ==="
          ls -la "$VERIFY_MOUNT"

          VERIFY_OK=1
          if [ ! -d "$VERIFY_MOUNT/Mynx.app" ]; then
            echo "::error::Mynx.app missing from final DMG" >&2
            VERIFY_OK=0
          fi
          if [ ! -f "$VERIFY_MOUNT/修复损坏.command" ]; then
            echo "::error::修复损坏.command missing from final DMG" >&2
            VERIFY_OK=0
          fi

          hdiutil detach "$VERIFY_MOUNT" >/dev/null 2>&1 || true
          rm -rf "$VERIFY_MOUNT"

          if [ "$VERIFY_OK" -ne 1 ]; then
            exit 1
          fi
          echo "OK: final DMG contains Mynx.app + 修复损坏.command"

      - name: Verify macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg_count=$(find src-tauri/target -name '*.dmg' -type f | wc -l | tr -d ' ')
          tgz_count=$(find src-tauri/target -name '*.app.tar.gz' -type f | wc -l | tr -d ' ')
          sig_count=$(find src-tauri/target -name '*.app.tar.gz.sig' -type f | wc -l | tr -d ' ')

          if [ "$dmg_count" -ne 1 ]; then
            echo "Expected exactly 1 macOS DMG, found $dmg_count" >&2
            find src-tauri/target -name '*.dmg' -type f -print
            exit 1
          fi
          if [ "$tgz_count" -ne 1 ]; then
            echo "Expected exactly 1 macOS updater .app.tar.gz, found $tgz_count" >&2
            find src-tauri/target -name '*.app.tar.gz' -type f -print
            exit 1
          fi
          if [ "$sig_count" -ne 1 ]; then
            echo "Expected exactly 1 macOS updater .app.tar.gz.sig, found $sig_count" >&2
            find src-tauri/target -name '*.app.tar.gz.sig' -type f -print
            exit 1
          fi

          sig_path=$(find src-tauri/target -name '*.app.tar.gz.sig' -type f | head -1)
          if [ ! -s "$sig_path" ]; then
            echo "macOS updater signature is empty: $sig_path" >&2
            exit 1
          fi

          printf 'macOS DMG:\n'
          find src-tauri/target -name '*.dmg' -type f -print
          printf 'macOS updater:\n'
          find src-tauri/target -name '*.app.tar.gz' -type f -print
          printf 'macOS signature:\n'
          find src-tauri/target -name '*.app.tar.gz.sig' -type f -print

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            src-tauri/target/**/*.dmg
            src-tauri/target/**/*.app.tar.gz
            src-tauri/target/**/*.app.tar.gz.sig
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════
  # Create Release + latest.json (after both builds succeed)
  # ════════════════════════════════════════════════════════════════════════
  release:
    needs:
      - prepare-tag
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -la {} \;

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets

          # Windows assets
          find artifacts/windows-assets -name 'mynx-installer.exe' -exec cp {} release-assets/ \;
          find artifacts/windows-assets -name 'mynx-installer.exe.sig' -exec cp {} release-assets/ \;

          # macOS assets (Apple Silicon)
          find artifacts/macos-assets -name '*.dmg' -exec cp {} release-assets/ \;
          find artifacts/macos-assets -name '*.app.tar.gz' -exec cp {} release-assets/ \;
          find artifacts/macos-assets -name '*.app.tar.gz.sig' -exec cp {} release-assets/ \;

          test -f release-assets/mynx-installer.exe || { echo "Windows installer missing" >&2; exit 1; }
          test -s release-assets/mynx-installer.exe.sig || { echo "Windows installer signature missing or empty" >&2; exit 1; }

          dmg_count=$(find release-assets -maxdepth 1 -name '*.dmg' -type f | wc -l | tr -d ' ')
          tgz_count=$(find release-assets -maxdepth 1 -name '*.app.tar.gz' -type f | wc -l | tr -d ' ')
          sig_count=$(find release-assets -maxdepth 1 -name '*.app.tar.gz.sig' -type f | wc -l | tr -d ' ')

          if [ "$dmg_count" -ne 1 ]; then
            echo "Expected exactly 1 release DMG, found $dmg_count" >&2
            exit 1
          fi
          if [ "$tgz_count" -ne 1 ]; then
            echo "Expected exactly 1 release macOS updater tarball, found $tgz_count" >&2
            exit 1
          fi
          if [ "$sig_count" -ne 1 ]; then
            echo "Expected exactly 1 release macOS updater signature, found $sig_count" >&2
            exit 1
          fi

          mac_tgz=$(find release-assets -maxdepth 1 -name '*.app.tar.gz' -type f | head -1)
          test -s "$mac_tgz.sig" || { echo "macOS updater signature missing or empty: $mac_tgz.sig" >&2; exit 1; }

          echo "=== release-assets contents ==="
          ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          version = json.loads(Path('package.json').read_text(encoding='utf-8'))['version']
          tag = '${{ needs.prepare-tag.outputs.release_tag }}'
          if tag != f'v{version}':
              raise SystemExit(f'Release tag {tag} does not match package.json version {version}')

          base = f'https://github.com/hanhan124/mynx/releases/download/{tag}'
          assets = Path('release-assets')

          win_exe = assets / 'mynx-installer.exe'
          win_sig = assets / 'mynx-installer.exe.sig'
          mac_dmgs = sorted(assets.glob('*.dmg'))
          mac_tgzs = sorted(p for p in assets.glob('*.app.tar.gz') if not str(p).endswith('.sig'))

          if not win_exe.exists():
              raise SystemExit('Windows installer is missing')
          if not win_sig.exists() or not win_sig.read_text(encoding='utf-8').strip():
              raise SystemExit('Windows signature is missing or empty')
          if len(mac_dmgs) != 1:
              raise SystemExit(f'Expected exactly 1 macOS DMG, found {len(mac_dmgs)}')
          if len(mac_tgzs) != 1:
              raise SystemExit(f'Expected exactly 1 macOS updater tarball, found {len(mac_tgzs)}')

          mac_tgz = mac_tgzs[0]
          mac_sig = Path(str(mac_tgz) + '.sig')
          if not mac_sig.exists() or not mac_sig.read_text(encoding='utf-8').strip():
              raise SystemExit(f'macOS updater signature is missing or empty: {mac_sig}')

          platforms = {
              'windows-x86_64': {
                  'url': f'{base}/mynx-installer.exe',
                  'signature': win_sig.read_text(encoding='utf-8').strip(),
              },
              'darwin-aarch64': {
                  'url': f'{base}/{mac_tgz.name}',
                  'signature': mac_sig.read_text(encoding='utf-8').strip(),
              },
          }

          latest = {
              'version': version,
              'date': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'notes': 'See the GitHub Release for full changelog.',
              'body': '',
              'platforms': platforms,
          }

          Path('release-assets/latest.json').write_text(
              json.dumps(latest, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          PY

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
