name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Build per platform (Windows + macOS in parallel)
  # ════════════════════════════════════════════════════════════════════════
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Visual Studio (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            installer/src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ── Windows: build main app + self-built installer ──────────────────
      - name: Build main app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build --no-bundle
          if ($LASTEXITCODE -ne 0) { throw "main app build failed" }
          if (-not (Test-Path "src-tauri/target/release/mynx.exe")) {
            throw "mynx.exe not produced"
          }
          Write-Host "OK: mynx.exe ($([math]::Round((Get-Item 'src-tauri/target/release/mynx.exe').Length/1MB,1)) MB)"

      - name: Sync installer payload (Windows)
        if: runner.os == 'Windows'
        run: npm run installer:payload

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd installer
          npm ci
          npm run tauri:build
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }
          $exe = "src-tauri\target\release\mynx-installer.exe"
          if (-not (Test-Path $exe)) { throw "installer exe not produced: $exe" }
          Write-Host "OK: $exe ($([math]::Round((Get-Item $exe).Length/1MB,1)) MB)"

      - name: Sign Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $installerPath = "installer\src-tauri\target\release\mynx-installer.exe"
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            try {
              & npx tauri signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$installerPath"
              Write-Host "Installer signed successfully"
            } catch {
              Write-Warning "Signing failed: $_"
            }
          } else {
            Write-Host "No signing key provided, uploading unsigned installer"
          }

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            installer/src-tauri/target/release/mynx-installer.exe
            installer/src-tauri/target/release/mynx-installer.exe.sig
          if-no-files-found: error

      # ── macOS: build .app + .dmg + updater .app.tar.gz ───────────────────
      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/*.app.tar.gz.sig
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════════
  # Create Release + latest.json (after both builds succeed)
  # ════════════════════════════════════════════════════════════════════════
  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -la {} \;

      - name: Prepare release assets
        id: prep
        shell: bash
        run: |
          set +e
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          mkdir -p release-assets

          # Windows assets
          cp artifacts/windows-assets/mynx-installer.exe release-assets/ 2>/dev/null
          cp artifacts/windows-assets/mynx-installer.exe.sig release-assets/ 2>/dev/null

          # macOS assets
          cp artifacts/macos-assets/*.dmg release-assets/ 2>/dev/null
          cp artifacts/macos-assets/*.app.tar.gz release-assets/ 2>/dev/null
          cp artifacts/macos-assets/*.app.tar.gz.sig release-assets/ 2>/dev/null

          # Debug: list what we have
          echo "=== release-assets contents ==="
          ls -la release-assets/

          # Read Windows signature
          WIN_SIG=""
          if [ -f release-assets/mynx-installer.exe.sig ]; then
            WIN_SIG=$(cat release-assets/mynx-installer.exe.sig)
          fi

          # Read macOS signature
          MAC_SIG=""
          MAC_TGZ=$(ls release-assets/*.app.tar.gz 2>/dev/null | grep -v '.sig$' | head -1)
          if [ -n "$MAC_TGZ" ] && [ -f "${MAC_TGZ}.sig" ]; then
            MAC_SIG=$(cat "${MAC_TGZ}.sig")
          fi

          echo "win_sig=$WIN_SIG" >> $GITHUB_OUTPUT
          echo "mac_sig=$MAC_SIG" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        shell: bash
        run: |
          set +e
          VERSION="${{ steps.prep.outputs.version }}"
          WIN_SIG="${{ steps.prep.outputs.win_sig }}"
          MAC_SIG="${{ steps.prep.outputs.mac_sig }}"
          GH_BASE="https://github.com/hanhan124/mynx/releases/download/v${VERSION}"

          TODAY=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find macOS updater tarball filename
          MAC_TGZ_NAME=""
          for f in release-assets/*.app.tar.gz; do
            if [ -f "$f" ] && [[ "$f" != *.sig ]]; then
              MAC_TGZ_NAME=$(basename "$f")
              break
            fi
          done

          echo "MAC_TGZ_NAME: $MAC_TGZ_NAME"

          # Build latest.json - only include platforms that have assets
          PLATFORMS=""
          PLATFORMS+="\"windows-x86_64\": {\"url\": \"${GH_BASE}/mynx-installer.exe\", \"signature\": \"${WIN_SIG}\"}"
          if [ -n "$MAC_TGZ_NAME" ]; then
            PLATFORMS+=", \"darwin-aarch64\": {\"url\": \"${GH_BASE}/${MAC_TGZ_NAME}\", \"signature\": \"${MAC_SIG}\"}"
          fi

          cat > release-assets/latest.json << ENDJSON
{
  "version": "${VERSION}",
  "date": "${TODAY}",
  "notes": "See the GitHub Release for full changelog.",
  "body": "",
  "platforms": {
    ${PLATFORMS}
  }
}
ENDJSON

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
