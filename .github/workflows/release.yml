name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Get signing key
        env:
          # 从 GitHub Secrets 读取私钥内容，写入临时文件
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath = "$env:TEMP\mynx.key"
          $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath $keyPath -Encoding ASCII
          echo "key_path=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $exe = Get-ChildItem "$nsisDir\*.exe" | Select-Object -First 1
          $sig  = Get-ChildItem "$nsisDir\*.sig" | Select-Object -First 1
          $json = Get-ChildItem "$nsisDir\latest.json" -ErrorAction SilentlyContinue
          $assets = @($exe.FullName)
          if ($sig)  { $assets += $sig.FullName }
          if ($json) { $assets += $json.FullName }
          echo "files=$($assets -join ',')" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
