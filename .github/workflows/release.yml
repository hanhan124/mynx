name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v2.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Prepare release tag once before matrix builds
  # ════════════════════════════════════════════════════════════════════════
  prepare-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must look like v2.2.0: $TAG" >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag already exists: $TAG" >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "release: $TAG"
            git push origin "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════
  # Build per platform (Windows + macOS Apple Silicon in parallel)
  # ════════════════════════════════════════════════════════════════════════
  build:
    needs: prepare-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Visual Studio (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            installer/src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ── Windows: build main app + self-built installer ──────────────────
      - name: Build main app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build --no-bundle
          if ($LASTEXITCODE -ne 0) { throw "main app build failed" }
          if (-not (Test-Path "src-tauri/target/release/mynx.exe")) {
            throw "mynx.exe not produced"
          }
          Write-Host "OK: mynx.exe ($([math]::Round((Get-Item 'src-tauri/target/release/mynx.exe').Length/1MB,1)) MB)"

      - name: Sync installer payload (Windows)
        if: runner.os == 'Windows'
        run: npm run installer:payload

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd installer
          npm ci
          npm run tauri:build
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }
          $exe = "src-tauri\target\release\mynx-installer.exe"
          if (-not (Test-Path $exe)) { throw "installer exe not produced: $exe" }
          Write-Host "OK: $exe ($([math]::Round((Get-Item $exe).Length/1MB,1)) MB)"

      - name: Sign Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $installerPath = "installer\src-tauri\target\release\mynx-installer.exe"
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            try {
              & npx tauri signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$installerPath"
              if ($LASTEXITCODE -ne 0) { throw "installer signing failed" }
              if (-not (Test-Path "$installerPath.sig")) { throw "installer signature not produced" }
              Write-Host "Installer signed successfully"
            } catch {
              Write-Warning "Signing failed: $_"
            }
          } else {
            Write-Host "No signing key provided, uploading unsigned installer"
          }

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            installer/src-tauri/target/release/mynx-installer.exe
            installer/src-tauri/target/release/mynx-installer.exe.sig
          if-no-files-found: error

      # ── macOS: build Apple Silicon .app + .dmg + updater .app.tar.gz ─────
      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run mac:build

      - name: Verify macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          dmgs=(src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg)
          tgzs=(src-tauri/target/aarch64-apple-darwin/release/**/*.app.tar.gz)
          sigs=(src-tauri/target/aarch64-apple-darwin/release/**/*.app.tar.gz.sig)

          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "No macOS DMG produced" >&2
            exit 1
          fi

          printf 'macOS DMG: %s\n' "${dmgs[@]}"
          if [ ${#tgzs[@]} -gt 0 ]; then
            printf 'macOS updater: %s\n' "${tgzs[@]}"
          else
            echo "No macOS updater .app.tar.gz produced; release will include DMG only"
          fi
          if [ ${#sigs[@]} -gt 0 ]; then
            printf 'macOS signature: %s\n' "${sigs[@]}"
          else
            echo "No macOS updater signature produced"
          fi

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/**/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/**/*.app.tar.gz.sig
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════
  # Create Release + latest.json (after both builds succeed)
  # ════════════════════════════════════════════════════════════════════════
  release:
    needs:
      - prepare-tag
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -la {} \;

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets

          # Windows assets
          find artifacts/windows-assets -name 'mynx-installer.exe' -exec cp {} release-assets/ \;
          find artifacts/windows-assets -name 'mynx-installer.exe.sig' -exec cp {} release-assets/ \;

          # macOS assets (Apple Silicon)
          find artifacts/macos-assets -name '*.dmg' -exec cp {} release-assets/ \;
          find artifacts/macos-assets -name '*.app.tar.gz' -exec cp {} release-assets/ \;
          find artifacts/macos-assets -name '*.app.tar.gz.sig' -exec cp {} release-assets/ \;

          echo "=== release-assets contents ==="
          ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          version = json.loads(Path('package.json').read_text(encoding='utf-8'))['version']
          tag = '${{ needs.prepare-tag.outputs.release_tag }}'
          base = f'https://github.com/hanhan124/mynx/releases/download/{tag}'
          assets = Path('release-assets')

          win_exe = assets / 'mynx-installer.exe'
          win_sig = assets / 'mynx-installer.exe.sig'
          mac_dmgs = sorted(assets.glob('*.dmg'))
          mac_tgzs = sorted(p for p in assets.glob('*.app.tar.gz') if not str(p).endswith('.sig'))

          if not win_exe.exists():
              raise SystemExit('Windows installer is missing')
          if not mac_dmgs:
              raise SystemExit('macOS DMG is missing')

          platforms = {}
          if win_sig.exists():
              platforms['windows-x86_64'] = {
                  'url': f'{base}/mynx-installer.exe',
                  'signature': win_sig.read_text(encoding='utf-8').strip(),
              }
          else:
              print('Windows signature is missing; latest.json will omit windows-x86_64')

          if mac_tgzs:
              mac_tgz = mac_tgzs[0]
              mac_sig = Path(str(mac_tgz) + '.sig')
              if mac_sig.exists():
                  platforms['darwin-aarch64'] = {
                      'url': f'{base}/{mac_tgz.name}',
                      'signature': mac_sig.read_text(encoding='utf-8').strip(),
                  }
              else:
                  print(f'macOS updater signature is missing; latest.json will omit darwin-aarch64: {mac_sig}')
          else:
              print('macOS updater tarball is missing; latest.json will omit darwin-aarch64')

          latest = {
              'version': version,
              'date': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'notes': 'See the GitHub Release for full changelog.',
              'body': '',
              'platforms': platforms,
          }

          Path('release-assets/latest.json').write_text(
              json.dumps(latest, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          PY

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
