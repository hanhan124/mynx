name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Visual Studio (for Rust MSVC linker)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      # ── 1. Build main app (mynx.exe) ─────────────────────────────────────
      - name: Build main app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build --no-bundle
          if ($LASTEXITCODE -ne 0) { throw "main app build failed" }
          if (-not (Test-Path "src-tauri/target/release/mynx.exe")) {
            throw "mynx.exe not produced"
          }
          Write-Host "OK: mynx.exe ($([math]::Round((Get-Item 'src-tauri/target/release/mynx.exe').Length/1MB,1)) MB)"

      # ── 2. Sync installer payload ───────────────────────────────────────
      - name: Sync installer payload
        run: npm run installer:payload

      # ── 3. Build installer (self-contained exe with embedded mynx.exe) ───
      - name: Build installer
        shell: pwsh
        run: |
          cd installer
          npm ci
          npm run tauri:build
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }
          $exe = "src-tauri\target\release\mynx-installer.exe"
          if (-not (Test-Path $exe)) { throw "installer exe not produced: $exe" }
          Write-Host "OK: $exe ($([math]::Round((Get-Item $exe).Length/1MB,1)) MB)"

      # ── 4. Sign installer + generate latest.json ───────────────────────
      - name: Prepare and sign release assets
        id: assets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Continue'
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $version = $pkg.version
          $installerPath = "installer\src-tauri\target\release\mynx-installer.exe"
          $sigPath = "$installerPath.sig"
          $ghBase = "https://github.com/hanhan124/mynx/releases/download/v${version}"

          # Only attempt signing if key is provided
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            try {
              & npx tauri signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$installerPath"
              Write-Host "Installer signed successfully"
            } catch {
              Write-Warning "Signing failed: $_"
            }
          } else {
            Write-Host "No signing key provided, uploading unsigned installer"
          }

          $sigContent = ""
          if (Test-Path $sigPath) {
            $sigContent = (Get-Content $sigPath -Raw).Trim()
          }

          $today = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $jsonObj = [ordered]@{
            version = $version
            date = $today
            notes = "See the GitHub Release for full changelog."
            body = ""
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url = "$ghBase/mynx-installer.exe"
                signature = $sigContent
              }
            }
          }

          $latestJsonPath = "installer\src-tauri\target\release\latest.json"
          [System.IO.File]::WriteAllText(
            $latestJsonPath,
            ($jsonObj | ConvertTo-Json -Depth 4 -Compress),
            [System.Text.UTF8Encoding]::new($false)
          )

          $assets = @()
          if (Test-Path $installerPath) { $assets += $installerPath }
          if (Test-Path $sigPath) { $assets += $sigPath }
          if (Test-Path $latestJsonPath) { $assets += $latestJsonPath }

          "ASSETS<<EOF" >> $env:GITHUB_ENV
          ($assets -join "`n") >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ env.ASSETS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}